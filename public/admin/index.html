<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Admin — Arizona Jeans</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bk:#0e0c0a;--dk:#141210;--c1:#1a1714;--c2:#211e1a;
  --gold:#c9a84c;--gold2:#a8813a;--gold-glow:rgba(201,168,76,0.12);
  --gold-border:rgba(201,168,76,0.22);--wh:#f5f0e8;--gr:#9a9085;
  --sv:#d4c9b8;--br:rgba(201,168,76,0.1);
  --green:#4ade80;--red:#f87171;--orange:#fb923c;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bk);color:var(--wh);font-family:'Inter',sans-serif;}
::-webkit-scrollbar{width:3px;} ::-webkit-scrollbar-thumb{background:var(--gold2);}

/* ── LOGIN ── */
#login-screen{position:fixed;inset:0;background:var(--bk);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px;}
.lc{background:var(--c1);border:1px solid var(--gold-border);padding:48px 40px;width:100%;max-width:380px;text-align:center;}
.lc .logo{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:900;color:var(--wh);margin-bottom:4px;}
.lc .logo span{color:var(--gold);}
.lc .sub{font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gr);margin-bottom:32px;}
.lc input{width:100%;background:var(--c2);border:1px solid rgba(255,255,255,0.08);color:var(--wh);padding:11px 14px;font-size:.88rem;font-family:'Inter',sans-serif;outline:none;margin-bottom:10px;border-radius:0;}
.lc input:focus{border-color:var(--gold-border);}
.lbtn{width:100%;padding:12px;background:var(--gold);color:var(--bk);border:none;font-family:'Inter',sans-serif;font-weight:700;font-size:.85rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;margin-top:6px;border-radius:0;}
.lbtn:hover{background:#deb95a;}
#lerr{color:var(--red);font-size:.78rem;margin-top:10px;display:none;}

/* ── LAYOUT ── */
#app{display:none;min-height:100vh;}
nav{background:var(--dk);border-bottom:1px solid var(--gold-border);padding:12px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.nav-brand{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:900;}
.nav-brand span{color:var(--gold);}
.nav-badge{font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gr);margin-left:8px;}
.nav-right{display:flex;align-items:center;gap:12px;}
#user-email{font-size:.72rem;color:var(--gr);}
.btn-logout{background:none;border:1px solid rgba(248,113,113,0.3);color:var(--red);padding:7px 14px;font-family:'Inter',sans-serif;font-weight:600;font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border-radius:0;}
.btn-logout:hover{background:rgba(248,113,113,0.08);}
.main{padding:28px;}

/* ── TABS ── */
.tabs{display:flex;gap:3px;margin-bottom:24px;border-bottom:1px solid var(--gold-border);padding-bottom:0;}
.tab{background:none;border:none;border-bottom:2px solid transparent;padding:10px 18px;font-family:'Inter',sans-serif;font-size:.75rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;color:var(--gr);margin-bottom:-1px;transition:color .2s,border-color .2s;}
.tab.on{color:var(--gold);border-bottom-color:var(--gold);}
.tab:hover:not(.on){color:var(--wh);}
.panel{display:none;} .panel.on{display:block;}

/* ── STATS ── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px;}
.sc{background:var(--c1);border:1px solid var(--br);padding:18px 20px;}
.sn{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:900;color:var(--gold);line-height:1;}
.sl{font-size:.62rem;color:var(--gr);letter-spacing:.1em;text-transform:uppercase;margin-top:4px;}

/* ── FORM ── */
.form-wrap{background:var(--c1);border:1px solid var(--gold-border);padding:28px;}
.form-title{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;margin-bottom:22px;border-bottom:1px solid var(--gold-border);padding-bottom:12px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.fg{display:flex;flex-direction:column;gap:5px;}
.fg.full{grid-column:1/-1;}
.fg label{font-size:.62rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gr);}
.fg input,.fg select,.fg textarea{background:var(--c2);border:1px solid rgba(255,255,255,0.08);color:var(--wh);padding:10px 13px;font-size:.85rem;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s;border-radius:0;width:100%;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--gold-border);}
.fg textarea{resize:vertical;min-height:72px;}
.fg select option{background:var(--c2);}
.check-row{display:flex;align-items:center;gap:8px;cursor:pointer;}
.check-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--gold);cursor:pointer;}
.check-row span{font-size:.82rem;font-weight:600;}
.checks-group{display:flex;gap:18px;flex-wrap:wrap;padding:8px 0;}
.form-actions{display:flex;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid var(--br);}
.btn-save{background:var(--gold);color:var(--bk);border:none;padding:11px 24px;font-family:'Inter',sans-serif;font-weight:700;font-size:.8rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border-radius:0;}
.btn-save:hover{background:#deb95a;}
.btn-cancel{background:none;border:1px solid rgba(255,255,255,0.12);color:var(--gr);padding:10px 20px;font-family:'Inter',sans-serif;font-size:.78rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;border-radius:0;}
.btn-cancel:hover{border-color:var(--gold-border);color:var(--wh);}
#form-msg{font-size:.78rem;margin-top:10px;display:none;}

/* ── UPLOAD ── */
.upload-area{border:1px dashed var(--gold-border);background:var(--bk);padding:22px;text-align:center;cursor:pointer;transition:border-color .2s;}
.upload-area:hover{border-color:var(--gold);}
.upload-area p{font-size:.78rem;color:var(--gr);}
.upload-area strong{color:var(--gold);}
#img-preview{max-width:100%;max-height:180px;margin-top:10px;display:none;border:1px solid var(--gold-border);}
#img-progress{height:2px;background:var(--gold);width:0;transition:width .3s;margin-top:6px;display:none;}

/* ── PRODUCT LIST ── */
.list-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px;}
.list-title{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;}
.btn-add{background:var(--gold);color:var(--bk);border:none;padding:9px 18px;font-family:'Inter',sans-serif;font-weight:700;font-size:.75rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border-radius:0;display:flex;align-items:center;gap:6px;}
.btn-add:hover{background:#deb95a;}
.search-bar{background:var(--c2);border:1px solid rgba(255,255,255,0.08);color:var(--wh);padding:8px 13px;font-size:.82rem;font-family:'Inter',sans-serif;outline:none;border-radius:0;width:220px;}
.search-bar:focus{border-color:var(--gold-border);}
.prod-table{width:100%;border-collapse:collapse;}
.prod-table th{background:var(--c2);padding:10px 14px;text-align:left;font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gr);font-weight:700;border-bottom:1px solid var(--gold-border);}
.prod-table td{padding:11px 14px;border-bottom:1px solid rgba(255,255,255,0.04);font-size:.82rem;vertical-align:middle;}
.prod-table tr:hover td{background:rgba(201,168,76,0.03);}
.prod-thumb{width:44px;height:44px;object-fit:cover;border:1px solid var(--gold-border);}
.prod-thumb-ph{width:44px;height:44px;background:var(--c2);display:flex;align-items:center;justify-content:center;font-size:1.4rem;border:1px solid var(--br);}
.badge{display:inline-block;padding:2px 8px;font-size:.6rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;}
.badge-on{background:rgba(74,222,128,0.12);border:1px solid rgba(74,222,128,0.3);color:var(--green);}
.badge-off{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.2);color:var(--red);}
.badge-gold{background:rgba(201,168,76,0.12);border:1px solid rgba(201,168,76,0.3);color:var(--gold);}
.badge-cat{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:var(--sv);font-size:.58rem;}
.act-btns{display:flex;gap:6px;}
.btn-edit{background:rgba(201,168,76,0.1);border:1px solid var(--gold-border);color:var(--gold);padding:5px 12px;font-size:.68rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;border-radius:0;}
.btn-edit:hover{background:rgba(201,168,76,0.2);}
.btn-hide{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:var(--gr);padding:5px 10px;font-size:.68rem;font-weight:700;cursor:pointer;border-radius:0;}
.btn-hide:hover{background:rgba(255,255,255,0.1);color:var(--wh);}
.btn-del{background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.25);color:var(--red);padding:5px 10px;font-size:.68rem;font-weight:700;cursor:pointer;border-radius:0;}
.btn-del:hover{background:rgba(248,113,113,0.18);}
.table-wrap{overflow-x:auto;}
.empty-msg{text-align:center;padding:48px;color:var(--gr);}
.empty-msg p{font-size:2rem;margin-bottom:10px;}
.spin{width:14px;height:14px;border:2px solid rgba(0,0,0,.2);border-top-color:#000;border-radius:50%;animation:spin .6s linear infinite;display:none;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-row{text-align:center;padding:44px;color:var(--gr);}
.lsp{width:22px;height:22px;border:2px solid rgba(201,168,76,0.2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px;}

/* ── TOAST ── */
#toast{position:fixed;bottom:24px;right:24px;background:var(--c1);border:1px solid var(--gold-border);padding:12px 20px;font-size:.8rem;display:none;z-index:9999;max-width:300px;}
#toast.ok{border-color:rgba(74,222,128,0.4);color:var(--green);}
#toast.err{border-color:rgba(248,113,113,0.4);color:var(--red);}

@media(max-width:700px){
  .stats-row{grid-template-columns:1fr 1fr;}
  .form-grid{grid-template-columns:1fr;}
  .fg.full{grid-column:1;}
  .main{padding:14px;}
  .prod-table td:nth-child(4),.prod-table th:nth-child(4){display:none;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="lc">
    <div class="logo">Arizona <span>Jeans</span></div>
    <div class="sub">Panel de administración</div>
    <input id="lemail" type="email" placeholder="admin@email.com" autocomplete="username">
    <input id="lpass" type="password" placeholder="Contraseña" autocomplete="current-password">
    <button class="lbtn" onclick="login()">Ingresar →</button>
    <div id="lerr">Email o contraseña incorrectos.</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <nav>
    <div>
      <span class="nav-brand">Arizona <span>Jeans</span></span>
      <span class="nav-badge">Admin</span>
    </div>
    <div class="nav-right">
      <span id="user-email"></span>
      <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
    </div>
  </nav>
  <div class="main">
    <!-- STATS -->
    <div class="stats-row" id="stats-row">
      <div class="sc"><div class="sn" id="st-total">—</div><div class="sl">Total prendas</div></div>
      <div class="sc"><div class="sn" id="st-vis">—</div><div class="sl">Visibles</div></div>
      <div class="sc"><div class="sn" id="st-dest">—</div><div class="sl">Destacadas</div></div>
      <div class="sc"><div class="sn" id="st-stock">—</div><div class="sl">Con stock</div></div>
    </div>
    <!-- TABS -->
    <div class="tabs">
      <button class="tab on" onclick="showTab('lista',this)">📋 Prendas</button>
      <button class="tab" onclick="showTab('nuevo',this)">➕ Agregar prenda</button>
    </div>
    <!-- LISTA -->
    <div class="panel on" id="panel-lista">
      <div class="list-header">
        <div class="list-title">Inventario</div>
        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
          <input class="search-bar" id="search" type="text" placeholder="Buscar prenda..." oninput="buscar()">
          <button class="btn-add" onclick="showTab('nuevo',document.querySelectorAll('.tab')[1]);resetForm()">+ Nueva prenda</button>
        </div>
      </div>
      <div class="table-wrap">
        <table class="prod-table">
          <thead><tr>
            <th style="width:56px">Foto</th>
            <th>Nombre</th>
            <th>Precio</th>
            <th>Categoría</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr></thead>
          <tbody id="prod-tbody"><tr><td colspan="6" class="loading-row"><div class="lsp"></div><p>Cargando inventario...</p></td></tr></tbody>
        </table>
      </div>
    </div>
    <!-- FORM NUEVO/EDITAR -->
    <div class="panel" id="panel-nuevo">
      <div class="form-wrap">
        <div class="form-title" id="form-title">➕ Nueva prenda</div>
        <input type="hidden" id="edit-id">
        <div class="form-grid">
          <div class="fg">
            <label>Nombre *</label>
            <input id="f-nombre" type="text" placeholder="Mom Jean Clásico">
          </div>
          <div class="fg">
            <label>Precio ARS *</label>
            <input id="f-precio" type="number" placeholder="15000" min="0">
          </div>
          <div class="fg">
            <label>Categoría</label>
            <select id="f-cat">
              <option value="">— Seleccionar —</option>
              <option value="jeans">👖 Jeans</option>
              <option value="remeras">👕 Remeras</option>
              <option value="blazers">🧥 Blazers</option>
              <option value="accesorios">👜 Accesorios</option>
              <option value="ofertas">🏷️ Ofertas</option>
            </select>
          </div>
          <div class="fg">
            <label>Talle</label>
            <select id="f-talle">
              <option value="">— Sin especificar —</option>
              <option>XS</option><option>S</option><option>M</option>
              <option>L</option><option>XL</option><option>XXL</option>
              <option>Único</option>
            </select>
          </div>
          <div class="fg">
            <label>Color</label>
            <input id="f-color" type="text" placeholder="Negro, Azul, Beige...">
          </div>
          <div class="fg">
            <label>Orden (menor = primero)</label>
            <input id="f-orden" type="number" placeholder="1" min="0">
          </div>
          <div class="fg full">
            <label>Descripción</label>
            <textarea id="f-desc" placeholder="Composición, detalles, cuidados..."></textarea>
          </div>
          <div class="fg full">
            <label>Nota (opcional, ej: últimas unidades)</label>
            <input id="f-nota" type="text" placeholder="⚠️ Últimas 2 unidades">
          </div>
          <div class="fg full">
            <label>Imagen del producto</label>
            <div class="upload-area" id="upload-area" onclick="document.getElementById('img-file').click()">
              <p>📸 <strong>Hacé clic</strong> para subir una foto</p>
              <p style="margin-top:4px;font-size:.7rem">JPG, PNG, WEBP · Máx. 5MB</p>
              <input type="file" id="img-file" accept="image/*" style="display:none" onchange="uploadImg(this)">
              <img id="img-preview" alt="Preview">
              <div id="img-progress"></div>
            </div>
            <input id="f-img" type="text" placeholder="https://... (URL de imagen)" style="margin-top:6px;">
          </div>
          <div class="fg full">
            <label>Opciones</label>
            <div class="checks-group">
              <label class="check-row"><input type="checkbox" id="f-visible" checked><span>Visible en tienda</span></label>
              <label class="check-row"><input type="checkbox" id="f-dest"><span>⭐ Destacada</span></label>
              <label class="check-row"><input type="checkbox" id="f-stock" checked><span>✓ En stock</span></label>
            </div>
          </div>
        </div>
        <div class="form-actions">
          <button class="btn-save" onclick="guardar()">
            <div class="spin" id="save-spin"></div>
            <span id="save-txt">💾 Guardar prenda</span>
          </button>
          <button class="btn-cancel" onclick="showTab('lista',document.querySelectorAll('.tab')[0]);resetForm()">Cancelar</button>
        </div>
        <div id="form-msg"></div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js';
import { getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc, doc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';
import { getStorage, ref, uploadBytesResumable, getDownloadURL } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-storage.js';

// ══ PEGÁ TUS CREDENCIALES FIREBASE ACÁ ══
const firebaseConfig = {
  apiKey: "AIzaSyCbH_m-ciMujL09xqPkCBkfM3RLO6Xq7JY",
  authDomain: "arizona-jeans.firebaseapp.com",
  projectId: "arizona-jeans",
  storageBucket: "arizona-jeans.firebasestorage.app",
  messagingSenderId: "913791532671",
  appId: "1:913791532671:web:dfe9c6eeece2b6bffac94a"
};
// ════════════════════════════════════════

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

let productos = [];

// ── AUTH ──
onAuthStateChanged(auth, user => {
  if (user) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('user-email').textContent = user.email;
    cargar();
  } else {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }
});

window.login = async function() {
  const e = document.getElementById('lemail').value.trim();
  const p = document.getElementById('lpass').value;
  const err = document.getElementById('lerr');
  err.style.display = 'none';
  if (!e || !p) { err.textContent = 'Completá los campos.'; err.style.display = 'block'; return; }
  try {
    await signInWithEmailAndPassword(auth, e, p);
  } catch {
    err.style.display = 'block';
  }
};

window.logout = () => signOut(auth);

// ── TABS ──
window.showTab = function(id, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  document.getElementById('panel-' + id).classList.add('on');
  btn.classList.add('on');
};

// ── TOAST ──
function toast(msg, type = 'ok') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = type; t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 3000);
}

// ── CARGAR PRODUCTOS ──
async function cargar() {
  try {
    const snap = await getDocs(collection(db, 'productos'));
    productos = snap.docs.map(d => ({ id: d.id, ...d.data() }))
      .sort((a, b) => (a.orden || 99) - (b.orden || 99));
    renderTabla(productos);
    renderStats(productos);
  } catch (e) {
    toast('Error al cargar productos: ' + e.message, 'err');
  }
}

function renderStats(lista) {
  document.getElementById('st-total').textContent = lista.length;
  document.getElementById('st-vis').textContent = lista.filter(p => p.visible !== false).length;
  document.getElementById('st-dest').textContent = lista.filter(p => p.destacado).length;
  document.getElementById('st-stock').textContent = lista.filter(p => p.stock).length;
}

const catIco = c => ({jeans:'👖',remeras:'👕',blazers:'🧥',accesorios:'👜',ofertas:'🏷️'}[c]||'👗');

function renderTabla(lista) {
  const tbody = document.getElementById('prod-tbody');
  if (!lista.length) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty-msg"><p>👗</p><p>No hay prendas todavía. ¡Agregá la primera!</p></td></tr>';
    return;
  }
  tbody.innerHTML = lista.map(p => `
    <tr>
      <td>${p.imagen ? `<img class="prod-thumb" src="${p.imagen}" alt="">` : `<div class="prod-thumb-ph">${catIco(p.categoria)}</div>`}</td>
      <td>
        <div style="font-weight:600;line-height:1.2">${p.nombre||'Sin nombre'}</div>
        ${p.talle ? `<div style="font-size:.65rem;color:var(--gr);margin-top:2px">Talle ${p.talle}${p.color?` · ${p.color}`:''}</div>` : ''}
      </td>
      <td style="font-family:'Playfair Display',serif;color:var(--gold);font-size:.95rem;white-space:nowrap">$${Number(p.precio||0).toLocaleString('es-AR')}</td>
      <td><span class="badge badge-cat">${catIco(p.categoria)} ${p.categoria||'—'}</span>${p.destacado?'<br><span class="badge badge-gold" style="margin-top:3px">⭐ Dest.</span>':''}</td>
      <td>
        <span class="badge ${p.visible!==false?'badge-on':'badge-off'}">${p.visible!==false?'Visible':'Oculto'}</span>
        <br><span class="badge ${p.stock?'badge-on':'badge-off'}" style="margin-top:3px">${p.stock?'Stock':'Sin stock'}</span>
      </td>
      <td>
        <div class="act-btns">
          <button class="btn-edit" onclick="window.editar('${p.id}')">✏️ Editar</button>
          <button class="btn-hide" onclick="window.toggleVisible('${p.id}',${p.visible!==false})">${p.visible!==false?'⛔':'👁️'}</button>
          <button class="btn-del" onclick="window.eliminar('${p.id}','${(p.nombre||'').replace(/'/g,'')}')">🗑️</button>
        </div>
      </td>
    </tr>`).join('');
}

// ── BUSCAR ──
window.buscar = function() {
  const q = document.getElementById('search').value.toLowerCase();
  const f = q ? productos.filter(p => (p.nombre||'').toLowerCase().includes(q) || (p.categoria||'').toLowerCase().includes(q)) : productos;
  renderTabla(f);
};

// ── GUARDAR ──
window.guardar = async function() {
  const nombre = document.getElementById('f-nombre').value.trim();
  const precio = Number(document.getElementById('f-precio').value);
  if (!nombre || !precio) { toast('Nombre y precio son obligatorios.', 'err'); return; }
  const btn = document.getElementById('save-txt');
  const sp = document.getElementById('save-spin');
  btn.textContent = 'Guardando...'; sp.style.display = 'inline-block';
  const data = {
    nombre,
    precio,
    descripcion: document.getElementById('f-desc').value.trim(),
    categoria: document.getElementById('f-cat').value,
    talle: document.getElementById('f-talle').value,
    color: document.getElementById('f-color').value.trim(),
    nota: document.getElementById('f-nota').value.trim(),
    orden: Number(document.getElementById('f-orden').value) || 99,
    imagen: document.getElementById('f-img').value.trim(),
    visible: document.getElementById('f-visible').checked,
    destacado: document.getElementById('f-dest').checked,
    stock: document.getElementById('f-stock').checked,
    updatedAt: serverTimestamp()
  };
  try {
    const eid = document.getElementById('edit-id').value;
    if (eid) {
      await updateDoc(doc(db, 'productos', eid), data);
      toast('✅ Prenda actualizada');
    } else {
      data.createdAt = serverTimestamp();
      await addDoc(collection(db, 'productos'), data);
      toast('✅ Prenda agregada');
    }
    await cargar();
    resetForm();
    showTab('lista', document.querySelectorAll('.tab')[0]);
  } catch (e) {
    toast('Error: ' + e.message, 'err');
  } finally {
    btn.textContent = '💾 Guardar prenda'; sp.style.display = 'none';
  }
};

// ── EDITAR ──
window.editar = function(id) {
  const p = productos.find(x => x.id === id);
  if (!p) return;
  document.getElementById('edit-id').value = id;
  document.getElementById('f-nombre').value = p.nombre || '';
  document.getElementById('f-precio').value = p.precio || '';
  document.getElementById('f-desc').value = p.descripcion || '';
  document.getElementById('f-cat').value = p.categoria || '';
  document.getElementById('f-talle').value = p.talle || '';
  document.getElementById('f-color').value = p.color || '';
  document.getElementById('f-nota').value = p.nota || '';
  document.getElementById('f-orden').value = p.orden || '';
  document.getElementById('f-img').value = p.imagen || '';
  document.getElementById('f-visible').checked = p.visible !== false;
  document.getElementById('f-dest').checked = !!p.destacado;
  document.getElementById('f-stock').checked = !!p.stock;
  if (p.imagen) {
    const prev = document.getElementById('img-preview');
    prev.src = p.imagen; prev.style.display = 'block';
  }
  document.getElementById('form-title').textContent = '✏️ Editar prenda';
  showTab('nuevo', document.querySelectorAll('.tab')[1]);
  window.scrollTo({ top: 0, behavior: 'smooth' });
};

// ── TOGGLE VISIBLE ──
window.toggleVisible = async function(id, current) {
  try {
    await updateDoc(doc(db, 'productos', id), { visible: !current });
    toast(current ? '⛔ Prenda ocultada' : '👁️ Prenda visible');
    await cargar();
  } catch (e) { toast('Error: ' + e.message, 'err'); }
};

// ── ELIMINAR ──
window.eliminar = async function(id, nombre) {
  if (!confirm(`¿Eliminar "${nombre}"?\nEsta acción no se puede deshacer.`)) return;
  try {
    await deleteDoc(doc(db, 'productos', id));
    toast('🗑️ Prenda eliminada');
    await cargar();
  } catch (e) { toast('Error: ' + e.message, 'err'); }
};

// ── UPLOAD IMAGEN ──
window.uploadImg = function(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) { toast('La imagen es muy grande (máx 5MB)', 'err'); return; }
  const prev = document.getElementById('img-preview');
  const prog = document.getElementById('img-progress');
  prev.src = URL.createObjectURL(file); prev.style.display = 'block';
  const storRef = ref(storage, `productos/${Date.now()}_${file.name.replace(/\s/g,'_')}`);
  const task = uploadBytesResumable(storRef, file);
  prog.style.display = 'block';
  task.on('state_changed',
    snap => { prog.style.width = (snap.bytesTransferred / snap.totalBytes * 100) + '%'; },
    err => { toast('Error al subir imagen: ' + err.message, 'err'); prog.style.display = 'none'; },
    async () => {
      const url = await getDownloadURL(task.snapshot.ref);
      document.getElementById('f-img').value = url;
      prog.style.display = 'none';
      toast('📸 Imagen subida');
    }
  );
};

// ── RESET FORM ──
window.resetForm = function() {
  ['f-nombre','f-precio','f-desc','f-color','f-nota','f-orden','f-img','edit-id'].forEach(id => { document.getElementById(id).value = ''; });
  document.getElementById('f-cat').value = '';
  document.getElementById('f-talle').value = '';
  document.getElementById('f-visible').checked = true;
  document.getElementById('f-dest').checked = false;
  document.getElementById('f-stock').checked = true;
  document.getElementById('img-preview').style.display = 'none';
  document.getElementById('img-progress').style.display = 'none';
  document.getElementById('form-title').textContent = '➕ Nueva prenda';
  document.getElementById('form-msg').style.display = 'none';
};

// Enter en login
document.getElementById('lpass').addEventListener('keydown', e => { if (e.key === 'Enter') window.login(); });
</script>
</body>
