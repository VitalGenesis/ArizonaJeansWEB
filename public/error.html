<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pago no procesado — Arizona Jeans</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0e0c0a;color:#f5f0e8;font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.card{background:#141210;border:1px solid rgba(201,168,76,0.25);padding:52px 40px;text-align:center;max-width:430px;width:100%;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,#f87171,transparent);}
.ico{font-size:3.8rem;margin-bottom:20px;display:block;}
h1{font-family:'Playfair Display',serif;font-size:2rem;font-weight:900;text-transform:uppercase;color:#f87171;margin-bottom:12px;letter-spacing:.02em;}
p{color:#9a9085;line-height:1.7;margin-bottom:28px;font-size:.9rem;}
.brand{font-family:'Playfair Display',serif;font-size:.85rem;color:rgba(201,168,76,0.6);margin-bottom:24px;letter-spacing:.1em;text-transform:uppercase;}
.btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
a{display:inline-block;padding:12px 24px;font-family:'Inter',sans-serif;font-weight:700;font-size:.8rem;letter-spacing:.08em;text-transform:uppercase;text-decoration:none;transition:all .2s;}
.btn-home{background:#c9a84c;color:#000;} .btn-home:hover{background:#deb95a;}
.btn-wa{background:#25D366;color:#fff;} .btn-wa:hover{background:#1da851;}
</style>
</head>
<body>
<div class="card">
  <span class="ico">❌</span>
  <div class="brand">Arizona Jeans</div>
  <h1>Pago no procesado</h1>
  <p>Hubo un problema con el pago. Intentá de nuevo o contactanos directamente por WhatsApp.</p>
  <div class="btns">
    <a href="/" class="btn-home">← Volver al inicio</a>
    <a href="https://wa.me/5493521410478?text=Hola! Tuve un problema con mi pago" class="btn-wa">WhatsApp</a>
  </div>
</div>
</body>
</html>
