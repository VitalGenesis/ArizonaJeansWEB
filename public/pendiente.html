<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pago pendiente — Arizona Jeans</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bk: #0e0c0a; --dk: #141210;
      --gold: #c9a84c; --gold2: #a8813a;
      --wh: #f5f0e8; --gr: #9a9085;
      --br: rgba(201,168,76,0.1);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bk); color: var(--wh);
      font-family: 'Inter', sans-serif; font-weight: 300;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .card {
      background: var(--dk); border: 1px solid rgba(201,168,76,0.2);
      padding: 52px 40px; text-align: center;
      max-width: 440px; width: 100%;
    }
    .ico { font-size: 3rem; margin-bottom: 20px; display: block; }
    .brand {
      font-family: 'Playfair Display', serif;
      font-size: 0.9rem; font-weight: 700;
      letter-spacing: 0.1em; color: var(--gold);
      text-transform: uppercase; margin-bottom: 20px; display: block;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem; font-weight: 700;
      color: #fb923c; margin-bottom: 14px; line-height: 1.2;
    }
    p { color: var(--gr); line-height: 1.7; margin-bottom: 28px; font-size: 0.92rem; }
    .btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    a {
      display: inline-block; padding: 12px 24px;
      font-family: 'Inter', sans-serif; font-weight: 700;
      font-size: 0.78rem; letter-spacing: 0.08em; text-transform: uppercase;
      text-decoration: none; transition: background 0.2s, transform 0.15s;
    }
    a:hover { transform: translateY(-1px); }
    .btn-home { background: var(--gold); color: #000; }
    .btn-home:hover { background: var(--gold2); }
    .btn-wa { background: #25D366; color: #fff; }
    .btn-wa:hover { background: #1da851; }
    .divider { width: 40px; height: 1px; background: var(--br); margin: 0 auto 24px; }
  </style>
</head>
<body>
  <div class="card">
    <span class="ico">⏳</span>
    <span class="brand">Arizona Jeans</span>
    <div class="divider"></div>
    <h1>Pago pendiente</h1>
    <p>Tu pago está en proceso de confirmación. Te notificamos por email cuando se apruebe. ¡Gracias por tu paciencia!</p>
    <div class="btns">
      <a href="/" class="btn-home">← Volver al inicio</a>
      <a href="https://wa.me/5493512345678?text=Hola!+Consulta+sobre+mi+pago+pendiente" class="btn-wa">WhatsApp</a>
    </div>
  </div>
</body>
</html>
